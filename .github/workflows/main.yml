name: Sync BIMI assets to R2
on:
  push:
    branches: [main]
    paths: ['image/**']
permissions:
  contents: read
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash
      - name: Sync to R2
        permissions:
        contents: read
        pull-requests: write
        run: |
          rclone sync ./image/ :s3:bimi-assets/image/ \
            --s3-provider Cloudflare \
            --s3-endpoint https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --s3-access-key-id ${{ secrets.R2_ACCESS_KEY_ID }} \
            --s3-secret-access-key ${{ secrets.R2_SECRET_ACCESS_KEY }}
