name: Sync BIMI site to R2
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'LICENSE'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Sync to R2
        run: |
          rclone sync . :s3:bimi-assets/ \
            --s3-provider Cloudflare \
            --s3-endpoint https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --s3-access-key-id ${{ secrets.R2_ACCESS_KEY_ID }} \
            --s3-secret-access-key ${{ secrets.R2_SECRET_ACCESS_KEY }} \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --exclude "LICENSE"
